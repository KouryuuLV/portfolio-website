name = "lukstins"
main = "dist/worker.js"
compatibility_date = "2024-04-21"
type = "javascript"

# Routes configuration for subdomains
routes = [
  { pattern = "juris.lukstins.eu/*", zone_name = "lukstins.eu" },
  { pattern = "karlis.lukstins.eu/*", zone_name = "lukstins.eu" },
  { pattern = "valdis.lukstins.eu/*", zone_name = "lukstins.eu" },
  { pattern = "peteris.lukstins.eu/*", zone_name = "lukstins.eu" },
  { pattern = "lukstins.eu/*", zone_name = "lukstins.eu" }
]

# Build configuration
build = { command = "npm run build:worker" }

# KV namespace for routing metadata (optional)
[[kv_namespaces]]
binding = "ROUTING"
id = "b965b7438ad940a2a6e93ae4bfe7b87e"

# Environment-specific configurations
[env.production]
routes = [
  { pattern = "juris.lukstins.eu/*", zone_name = "lukstins.eu" },
  { pattern = "karlis.lukstins.eu/*", zone_name = "lukstins.eu" },
  { pattern = "valdis.lukstins.eu/*", zone_name = "lukstins.eu" },
  { pattern = "peteris.lukstins.eu/*", zone_name = "lukstins.eu" },
  { pattern = "lukstins.eu/*", zone_name = "lukstins.eu" }
]

[env.staging]
routes = [
  { pattern = "staging.lukstins.eu/*", zone_name = "lukstins.eu" }
]
